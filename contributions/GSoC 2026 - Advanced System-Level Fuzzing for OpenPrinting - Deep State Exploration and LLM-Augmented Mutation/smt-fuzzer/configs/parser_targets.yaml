targets:
  - id: ppd_text_to_rastertopclx_discovery
    description: General PPD string-value variation through cupsfilter into rastertopclx without bug-specific payloads.
    ppd_kind: rastertopclx_general_strings
    document_kind: text
    executor: cupsfilter
    input_mime: text/plain
    output_mime: printer/foo
    expected_filters:
      - universal
      - rastertopclx
    cases: 4
    oracle: crash_or_signal

  - id: cups_raster_to_rastertopclx_discovery
    description: General valid CUPS Raster sweep into rastertopclx.
    ppd_kind: rastertopclx_plain
    document_kind: cups_raster_boundary_sweep
    executor: direct_filter
    filter_binary: /usr/lib/cups/filter/rastertopclx
    input_mime: application/vnd.cups-raster
    expected_filters:
      - rastertopclx
    cases: 4
    oracle: crash_or_signal

  - id: cups_raster_to_rastertoescpx_discovery
    description: General valid CUPS Raster sweep into rastertoescpx.
    ppd_kind: rastertoescpx_size_sweep
    document_kind: cups_raster_boundary_sweep
    executor: direct_filter
    filter_binary: /usr/lib/cups/filter/rastertoescpx
    input_mime: application/vnd.cups-raster
    expected_filters:
      - rastertoescpx
    cases: 4
    oracle: crash_or_signal

  - id: pwg_to_raster_discovery
    description: General output-resolution and PWG Raster header sweep into pwgtoraster.
    ppd_kind: pwg_resolution_sweep
    document_kind: pwg_raster_boundary_sweep
    executor: direct_filter
    filter_binary: /usr/lib/cups/filter/pwgtoraster
    input_mime: application/vnd.cups-pwg
    expected_filters:
      - pwgtoraster
    cases: 4
    oracle: crash_or_signal
