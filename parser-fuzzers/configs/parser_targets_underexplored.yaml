targets:
  - id: pdf_to_pdftopdf_underexplored
    description: Underexplored PDF parser sweep into ASan-built pdftopdf.
    ppd_kind: pdftopdf_coverage_options
    document_kind: pdf_coverage_sweep
    executor: direct_filter
    filter_binary: /data/pre-gsoc/cups-filters/pdftopdf
    input_mime: application/pdf
    expected_filters:
      - pdftopdf
    cases: 16
    oracle: crash_or_signal

