targets:
  - id: pdf_to_pdftopdf_semantic_f30
    description: Semantic PDF parser sweep into ASan-built pdftopdf for feedback-guided 30 minute runs.
    ppd_kind: pdftopdf_coverage_options
    document_kind: pdf_semantic_sweep
    executor: direct_filter
    filter_binary: /data/pre-gsoc/cups-filters/pdftopdf
    input_mime: application/pdf
    expected_filters:
      - pdftopdf
    cases: 96
    oracle: crash_or_signal

