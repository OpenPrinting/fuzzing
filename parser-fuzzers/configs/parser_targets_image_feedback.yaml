targets:
  - id: image_to_imagetoraster_feedback
    description: Feedback-driven SMT image parser sweep into ASan-built imagetoraster.
    ppd_kind: imagetoraster_coverage_options
    document_kind: image_feedback_sweep
    executor: direct_filter
    filter_binary: /data/pre-gsoc/cups-filters/imagetoraster
    input_mime: image/x-portable-anymap
