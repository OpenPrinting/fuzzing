targets:
  - id: cups_raster_to_rastertopclx_coverage
    description: Coverage-discovery CUPS Raster sweep into ASan-built rastertopclx with varied PPD option groups.
    ppd_kind: raster_coverage_options
    document_kind: cups_raster_coverage_sweep
    executor: direct_filter
    filter_binary: /data/pre-gsoc/cups-filters/rastertopclx
    input_mime: application/vnd.cups-raster
    expected_filters:
      - rastertopclx
    cases: 14
    oracle: crash_or_signal

